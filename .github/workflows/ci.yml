name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPO: floorplan-3d-repo
  IMAGE: train

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install flake8

      - name: 代码检查
        run: |
          flake8 b_data/ c_models/ g_training/ \
            --max-line-length=120 \
            --exclude=__pycache__,.ipynb_checkpoints \
            --ignore=E127,E128,E226,E241,E501,E741,F401,F541,W293,E302,E305,E402

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: 登录 GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 配置 Docker 认证
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: 构建并推送镜像
        run: |
          IMAGE_PATH=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}
          docker build \
            -t ${IMAGE_PATH}:${{ github.sha }} \
            -t ${IMAGE_PATH}:latest .
          docker push ${IMAGE_PATH}:${{ github.sha }}
          docker push ${IMAGE_PATH}:latest